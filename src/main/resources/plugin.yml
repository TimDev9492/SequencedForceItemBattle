name: SequencedForceItemBattle
main: me.timwastaken.sequencedfib.SequencedForceItemBattle

# This is the plugin's internal versioning (independent of minecraft)
version: '1.0.1'
# Based on this versions, the server decides if the plugin is
# compatible with the versions it is running
api-version: '1.21'
# The spigot api version this plugin gets compiled against
# (also displayed as the minimum version in the output jar filename)
compiled-version: '1.21.11'

# Select which fields of this yml get printed to STDOUT using the printMetadata Task
expose:
  - version
  - api-version
  - compiled-version

depend: [IntertoryAPI]
commands:
  skip:
    description: Skips the current objective for a player
    usage: skip
    permission: sfib.skip
  start:
    description: Starts a new game
    usage: start
    permission: sfib.start
  backpack:
    description: Opens a player's backpack
    usage: backpack
    aliases:
      - bp
  overview:
    description: Displays an overview of the current game state
    usage: overview
    aliases:
      - ov
  pause:
    description: Toggles the paused state of the game
    usage: pause
  sequence:
    description: Prints the discovered item sequence
    usage: sequence
    aliases:
      - seq
  info:
    description: Displays the item you have to obtain next
    usage: info
  exclude:
    description: Adds a material to the exclude config
    usage: exclude <material>
